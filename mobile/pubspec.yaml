name: nyansa_mobile
description: Nyansa Data Collection Platform - Offline First Mobile App.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # State Management & Routing
  provider: ^6.1.1
  go_router: ^13.0.0
  
  # Storage (Offline-first)
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # Network
  http: ^1.1.0
  dio: ^5.4.0
  jwt_decoder: ^2.0.1
  
  # Media
  record: ^5.0.4
  audioplayers: ^5.2.1
  camera: ^0.10.5+5
  image_picker: ^1.0.4
  
  # Anti-fraud & Device
  device_info_plus: ^9.1.0
  
  # UI & Utilities
  google_fonts: ^6.1.0
  intl: ^0.18.1
  geolocator: ^10.1.0
  uuid: ^4.2.1
  crypto: ^3.0.3
  encrypt: ^5.0.3
  connectivity_plus: ^5.0.2
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  drift_dev: ^2.14.0
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
